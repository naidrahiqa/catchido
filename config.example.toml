[general]
download_dir = "C:\\Pictures\\Catchido"
max_concurrent_downloads = 5
auto_dedup = true
dedup_threshold = 5          # hamming distance threshold
prefer_higher_res = true     # auto-replace with higher res duplicates
log_level = "INFO"
log_file = "./logs/oshi-hunter.log"

[twitter]
bearer_token = ""
rate_limit_wait = 15         # seconds to wait on rate limit
include_retweets = false
min_resolution = [1080, 1080]  # minimum width x height

[weibo]
cookie = ""
use_playwright = false       # fallback to browser automation
request_delay = 2            # seconds between requests

[instagram]
session_cookie = ""          # Optional: sessionid cookie to bypass rate limit
request_delay = 2            # seconds between requests

[proxy]
enabled = false
http = ""
https = ""

[search]
min_relevance_score = 0.3    # skip posts below this score
auto_discover_accounts = true
auto_generate_keywords = true
include_fan_content = true   # include fan-taken photos
exclude_fanart = true        # filter out drawings/fanart

